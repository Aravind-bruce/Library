<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Project | Management Portal</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f8fafc; /* Same as login records */
            color: #1e293b;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* HEADER & ACTIONS */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.5px;
        }

        /* BACK BUTTON STYLE (Matches your records page) */
        a.button-back {
            padding: 10px 20px;
            background: #ffffff;
            color: #475569;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        a.button-back:hover {
            background: #f1f5f9;
            color: #1e293b;
            transform: translateX(-3px);
            border-color: #cbd5e1;
        }

        /* MAIN CARD */
        .form-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #e2e8f0;
        }

        /* FORM GRID */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* INPUTS & DROPDOWNS */
        input, select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background-color: #ffffff;
            font-size: 14px;
            color: #1e293b;
            box-sizing: border-box;
            transition: all 0.2s;
            appearance: none;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* CUSTOM SELECT ARROW */
        .select-wrapper {
            position: relative;
        }

        .select-wrapper::after {
            content: "▼";
            font-size: 10px;
            color: #94a3b8;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        /* SECTION HEADERS */
        h3 {
            grid-column: span 2;
            margin: 20px 0 10px 0;
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 10px;
        }

        /* UPLOAD BUTTON */
        .submit-btn {
            margin-top: 30px;
            width: 100%;
            padding: 14px;
            background: #2563eb; /* Professional Blue */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #1d4ed8;
        }

        /* FILE INPUT */
        input[type="file"] {
            border: 2px dashed #e2e8f0;
            padding: 20px;
            text-align: center;
            background: #f8fafc;
            cursor: pointer;
        }
    </style>
</head>
<body>
<br><br>
<div class="container">
    <div class="header-area">
        <h2>Upload Project</h2>
        <a href="{% url 'home' %}" class="button-back">
            <span>←</span> Back to Home
        </a>
    </div>

    <div class="form-card">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-grid">
                
                <div class="input-group">
                    <label>Project Type</label>
                    <div class="select-wrapper">
                        <select name="project_type">
                            <option>Major Project</option>
                            <option>Minor Project</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>Submission Date</label>
                    <input type="date" name="submission_date" required>
                </div>

                <div class="full-width">
                    <label>Project Title</label>
                    <input type="text" name="title" placeholder="Enter official project title" required>
                </div>

                <div class="input-group">
                    <label>Keywords</label>
                    <input type="text" name="keywords" placeholder="AI, Web, IoT...">
                </div>

                <div class="input-group">
                    <label>Academic Year</label>
                    <div class="select-wrapper">
                        <select name="academic_year">
                            <option>2023-2024</option>
                            <option>2024-2025</option>
                            <option>2025-2026</option>
                            <option>2026-2027</option>
                            <option>2027-2028</option>
                        </select>
                    </div>
                </div>

                <div class="full-width">
                    <label>Abstract</label>
                    <input type="text" name="abstract" placeholder="Brief summary of your project" required>
                </div>

                <div class="full-width">
                    <label>Department</label>
                    <div class="select-wrapper">
                        <select name="department">
                            <option value="">--- Select Department ---</option>
                            <option value="Artificial Intelligence and Data Science">Artificial Intelligence and Data Science</option>
                            <option value="Artificial Intelligence and Machine Learning">Artificial Intelligence and Machine Learning</option>
                            <option value="Computer Science Engineering">Computer Science Engineering</option>
                            <option value="Civil Engineering">Civil Engineering</option>
                            <option value="Information Technology">Information Technology</option>
                            <option value="Cyber Security">Cyber Security</option>
                            <option value="Mechanical Engineering">Mechanical Engineering</option>
                        </select>
                    </div>
                </div>

                <h3>Team Leader</h3>
                <input type="text" name="team_leader" placeholder="Full Name" required>
                <input type="text" name="team_leader_reg" placeholder="Register Number" required>

                <h3>Team Members</h3>
                <input type="text" name="member1" placeholder="Member 1 Name" required>
                <input type="text" name="member1_reg" placeholder="Reg No" required>

                <input type="text" name="member2" placeholder="Member 2 Name" required>
                <input type="text" name="member2_reg" placeholder="Reg No" required>

                <input type="text" name="member3" placeholder="Member 3 Name" required>
                <input type="text" name="member3_reg" placeholder="Reg No" required>

                <input type="text" name="member4" placeholder="Member 4 (optional)">
                <input type="text" name="member4_reg" placeholder="Reg No">

                <input type="text" name="member5" placeholder="Member 5 (optional)">
                <input type="text" name="member5_reg" placeholder="Reg No">

                <input type="text" name="member6" placeholder="Member 6 (optional)">
                <input type="text" name="member6_reg" placeholder="Reg No">
<br>
                <div class="full-width">
                    <label>Upload Project Report (PDF Only)</label>
                    <input type="file" name="pdf_file" accept=".pdf" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">Complete Submission</button>

        </form>
    </div>
</div>

</body>
</html>
