<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Secure Access</title>

    <style>
        /* Modern Font Stack */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1f2937;
        }

        /* 3D FLIP CONTAINER */
        .flip-wrapper {
            perspective: 2000px;
            width: 100%;
            max-width: 1050px;
            padding: 20px;
        }
        .flip-card {
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flip-animate {
            transform: rotateY(180deg);
        }

        /* MAIN CARD - RESPONSIVE HEIGHT/WIDTH */
        .main-card {
            width: 100%;
            min-height: 600px;
            background: white;
            border-radius: 24px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            animation: fadeIn 0.8s ease-out;
        }

        /* LEFT IMAGE SECTION - HIDDEN ON MOBILE */
        .left-section {
            width: 55%;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1200')
                        no-repeat center center/cover;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 50px;
        }

        .left-section::before {
            content: "Excellence in Education";
            color: white;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* RIGHT FORM AREA - SCALES TO 100% ON MOBILE */
        .right-section {
            width: 45%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* RESPONSIVE BREAKPOINT FOR TABLETS/MOBILES */
        @media (max-width: 968px) {
            .left-section {
                display: none; /* Hide image on smaller screens to save space */
            }
            .right-section {
                width: 100%;
                padding: 30px;
            }
            .main-card {
                min-height: auto;
            }
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 28px;
            font-weight: 700;
            color: #111827;
        }

        .subtitle {
            color: #6b7280;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .box { margin-bottom: 20px; }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
            color: #374151;
            font-size: 14px;
        }

        /* INPUT STYLING */
        input[type="text"], 
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            outline: none;
            transition: all 0.2s;
            background: #f9fafb;
            font-size: 15px;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #2563eb;
            background: white;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        /* ROLE SELECTION CARDS - ADJUSTS TO 1 COLUMN ON TINY SCREENS */
        .role-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 8px;
        }

        @media (max-width: 480px) {
            .role-container {
                grid-template-columns: 1fr; /* Stack roles on small phones */
            }
            .role-content {
                flex-direction: row !important;
                gap: 15px;
                justify-content: flex-start !important;
                padding: 12px 20px !important;
            }
        }

        .role-card { cursor: pointer; position: relative; }
        .role-card input { position: absolute; opacity: 0; }

        .role-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px 5px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .role-icon { font-size: 18px; margin-bottom: 4px; }
        .role-name { font-size: 12px; font-weight: 600; color: #4b5563; }

        .role-card input:checked + .role-content {
            border-color: #2563eb;
            background: #eff6ff;
            box-shadow: 0 0 0 1px #2563eb;
        }
        
        /* LOGIN BUTTON */
        button {
            width: 100%;
            padding: 16px;
            background: #111827;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            margin-top: 15px;
        }

        button:hover {
            background: #1f2937;
            transform: translateY(-1px);
        }

        /* MESSAGES */
        .error, .msg-success {
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 10px;
            font-size: 14px;
        }
        .error { background: #fef2f2; color: #991b1b; border: 1px solid #fee2e2; }
        .msg-success { background: #f0fdf4; color: #166534; border: 1px solid #dcfce7; }

        .signup-text {
            margin-top: 25px;
            text-align: center;
            font-size: 14px;
            color: #6b7280;
        }

        .signup-text a {
            color: #2563eb;
            font-weight: 600;
            text-decoration: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="flip-wrapper">
    <div class="flip-card" id="flipBox">

        <div class="main-card">
            <div class="left-section"></div>

            <div class="right-section">
                <h2>Welcome Back</h2>
                <p class="subtitle">Please enter your details to sign in.</p>

                {% if messages %}
                    {% for message in messages %}
                        <div class="{% if message.tags == 'error' %}error{% else %}msg-success{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}

                    <div class="box">
                        <label>Username</label>
                        <input type="text" name="username" placeholder="Enter your username" required>
                    </div>

                    <div class="box">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>

                    <div class="box">
                        <label>Login As</label>
                        <div class="role-container">
                            <label class="role-card">
                                <input type="radio" name="role" value="student" required>
                                <div class="role-content">
                                    <span class="role-icon">🎓</span>
                                    <span class="role-name">Student</span>
                                </div>
                            </label>

                            <label class="role-card">
                                <input type="radio" name="role" value="staff" required>
                                <div class="role-content">
                                    <span class="role-icon">👨‍🏫</span>
                                    <span class="role-name">Staff</span>
                                </div>
                            </label>

                            <label class="role-card">
                                <input type="radio" name="role" value="admin" required>
                                <div class="role-content">
                                    <span class="role-icon">🛡️</span>
                                    <span class="role-name">Admin</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <button type="submit">Sign In</button>
                </form>

                <p class="signup-text">
                    Don't have an account? 
                    <a href="#" onclick="flipToSignup()">Sign up for free</a>
                </p>
            </div>
        </div>

    </div>
</div>

<script>
function flipToSignup() {
    document.getElementById("flipBox").classList.add("flip-animate");
    // Small delay to let the user see the 3D flip animation before redirecting
    setTimeout(() => {
        window.location.href = "{% url 'signup' %}";
    }, 600);
}
</script>

</body>
</html>
